shared = ["target"]
context_files = ["AGENTS.md"]
primary_assistant = ["cerebras"]

[keymap.normal]
"t" = "toggle_tools"
"r" = "toggle_reasoning"
"s" = "toggle_developer"
"j" = "tab_next"
"k" = "tab_prev"
"S-d" = "tab_delete"
"S-y" = "tab_duplicate"
"o" = "tab_new"
"q" = "app_quit"
"enter" = "submit"
"S-r" = "retry"
"S-x" = "abort"
"i" = "enter_insert"
"up" = "scroll_line_up"
"down" = "scroll_line_down"
"tab" = "assistant_next"
"C-y" = "scroll_line_up"
"C-e" = "scroll_line_down"
"C-u" = "scroll_half_page_up"
"C-d" = "scroll_half_page_down"
"C-b" = "scroll_page_up"
"C-f" = "scroll_page_down"
"[" = "scroll_prev_element"
"]" = "scroll_next_element"
"g" = "scroll_top"
"S-g" = "scroll_bottom"
"1" = "set_multiplier 1"
"2" = "set_multiplier 2"
"3" = "set_multiplier 3"
"4" = "set_multiplier 4"
"5" = "set_multiplier 5"
"6" = "set_multiplier 6"
"7" = "set_multiplier 7"
"8" = "set_multiplier 8"
"9" = "set_multiplier 9"

[keymap.insert]
"enter" = "submit"
"esc" = "exit_insert"

[assistants.cerebras]
provider = "cerebras"
model = "zai-glm-4.7"
[assistants.gpt]
provider = "openai"
model = "gpt-5.1-codex-mini"
effort = "low"
[assistants.llama]
provider = "llama"
model = "dummy"
[assistants.zai]
provider = "zai"
model = "glm-5"

[providers.openrouter]
base_url = "https://openrouter.ai/api/v1"
key_command = "cat /run/agenix/openrouter"
[providers.llama]
base_url = "$LLAMA_HOST/v1"
developer_as_user = true
[providers.openai]
base_url = "https://api.openai.com/v1"
key_command = "cat /run/agenix/openai"
[providers.cerebras]
base_url = "https://api.cerebras.ai/v1"
key_command = "cat /run/agenix/cerebras"
api = "chat_completions"
reasoning_content_field = "reasoning"
reasoning_as_output = "think"
[providers.zai]
base_url = "https://api.z.ai/api/coding/paas/v4"
key_command = "cat /run/agenix/zai"
api = "chat_completions"
reasoning_content_field = "reasoning_content"

[bash]
  cmd = [
    "bash",
    "-c",
  ]
  [bash.bwrap]
    bin = "bwrap"
    args = [
      "--die-with-parent",
      "--proc",
      "/proc",
      "--dev",
      "/dev",
    ]
    [[bash.bwrap.stages]]
      ro = [
        "/nix",
        "/bin",
        "/usr",
        "/etc",
        "/lib",
        "/lib64",
        "/run/current-system",
        "/run/systemd/resolve/stub-resolv.conf",

        "$XDG_CONFIG_HOME",
        "~/.bashrc",
        "~/.bash_profile",
        "~/.profile",

        "$GHQ_ROOT",
      ]
      tmpfs = [
        "/tmp",
        "$TMPDIR",

        "$XDG_CACHE_HOME",
        "$XDG_STATE_HOME",
        "$XDG_DATA_HOME",
      ]
    [[bash.bwrap.stages]]
      rw = [
        "$CARGO_HOME",
      ]
